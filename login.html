<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Admin</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Rubik', sans-serif; background: #f4f6f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #1a7a2e; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .error { color: red; font-size: 0.9rem; display: none; margin-bottom: 10px; }
    </style>
<base target="_blank">
</head>
<body>
    <div class="login-card">
        <img id="login-logo" src="" alt="Logo" style="display:none;width:72px;height:72px;border-radius:14px;object-fit:cover;margin-bottom:12px">
        <h2 id="login-nome">Admin</h2>
        <div id="msg-erro" class="error"></div>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="fazerLogin()">ENTRAR</button>
    </div>

    <script src="supabaseClient.js"></script>

    <script>
        // Carrega nome e logo do restaurante ao abrir a tela de login
        window.addEventListener('DOMContentLoaded', async function() {
            try {
                if (window.supa) {
                    const { data } = await window.supa
                        .from('configuracoes')
                        .select('nome_restaurante, logo_url, icone_url, cor_primaria')
                        .maybeSingle();
                    if (data) {
                        if (data.nome_restaurante) {
                            const el = document.getElementById('login-nome');
                            if (el) el.textContent = data.nome_restaurante;
                            document.title = 'Login — ' + data.nome_restaurante;
                        }
                        const logo = data.logo_url || data.icone_url || '';
                        if (logo) {
                            const img = document.getElementById('login-logo');
                            if (img) { img.src = logo; img.style.display = 'block'; }
                        }
                        if (data.cor_primaria) {
                            document.querySelector('button').style.background = data.cor_primaria;
                        }
                    }
                }
            } catch(e) { /* ignora — login funciona sem config */ }
        });
        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('senha').value;
            const msg = document.getElementById('msg-erro');

            // Verifica se a conexão existe
            if(!window.supa) {
                alert("Erro: Banco de dados não conectado. Verifique o console.");
                return;
            }

            try {
                // NOTA: Usamos 'supa' aqui
                const { data, error } = await supa.auth.signInWithPassword({ email, password });

                if (error) {
                    msg.innerText = "Erro: " + error.message;
                    msg.style.display = 'block';
                } else {
                    window.location.href = 'admin.html';
                }
            } catch (err) {
                console.error(err);
                msg.innerText = "Erro inesperado.";
                msg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
